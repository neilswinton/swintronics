---
# Configure host-level system services:
#   - unattended-upgrades for automatic security patches
#   - reboot-scheduled hook: Telegram notice when updates flag a pending reboot
#   - pre-reboot hook: runs at shutdown while the network is still up (ExecStop
#     pattern); records the shutdown reason, pauses healthchecks.io, notifies Telegram
#   - post-boot hook: wait for Gatus, resume healthchecks.io (Telegram alert on failure)
#   - boot-notify hook: send a Telegram message on every boot including the
#     recorded shutdown reason (catches crashes and watchdog-triggered reboots,
#     not just planned shutdowns)
#
# Usage:
#   ansible-playbook playbooks/configure-system-services.yml

- name: Configure host system services
  hosts: "{{ target | default('clusters') }}"
  become: yes

  pre_tasks:
    - name: Login to Infisical
      infisical.vault.login:
        url: "https://app.infisical.com"
        auth_method: universal_auth
        universal_auth_client_id: "{{ infisical_client_id }}"
        universal_auth_client_secret: "{{ infisical_client_secret }}"
      register: infisical_login
      delegate_to: localhost
      check_mode: no

    - name: Fetch secrets from Infisical
      infisical.vault.read_secrets:
        login_data: "{{ infisical_login.login_data }}"
        project_id: "{{ infisical_project_id }}"
        env_slug: "{{ infisical_environment }}"
        path: "/"
        as_dict: true
      register: infisical_secrets
      delegate_to: localhost
      check_mode: no

  tasks:
    # ── Install packages ──────────────────────────────────────────────────────

    - name: Install unattended-upgrades
      apt:
        name:
          - unattended-upgrades
          - apt-listchanges
        state: present
        update_cache: yes

    # ── Configure unattended-upgrades ─────────────────────────────────────────

    - name: Configure unattended-upgrades
      copy:
        dest: /etc/apt/apt.conf.d/50swintronics-unattended-upgrades
        content: |
          // Swintronics unattended-upgrades configuration.
          // Managed by Ansible. Do not edit — changes will be overwritten on next deployment.

          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}-security";
              "${distro_id}ESMApps:${distro_codename}-apps-security";
              "${distro_id}ESM:${distro_codename}-infra-security";
          };

          Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
          Unattended-Upgrade::Remove-New-Unused-Dependencies "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "false";
          Unattended-Upgrade::Automatic-Reboot "true";
          // Reboot at 03:00, after the 02:00 immich DB dump and before the 04:00 backup cron.
          Unattended-Upgrade::Automatic-Reboot-Time "03:00";
        mode: '0644'
      notify: restart unattended-upgrades

    - name: Enable unattended-upgrades service
      service:
        name: unattended-upgrades
        enabled: yes
        state: started

    # ── Store monitoring credentials for reboot scripts ───────────────────────
    # These tasks require HEALTHCHECKS_API_KEY in Infisical — skip for clusters
    # that haven't set up healthchecks.io yet.

    - name: Check if monitoring secrets are available
      ansible.builtin.set_fact:
        _has_monitoring_secrets: "{{ 'HEALTHCHECKS_API_KEY' in infisical_secrets.secrets }}"

    - name: Create /etc/swintronics directory
      file:
        path: /etc/swintronics
        state: directory
        owner: root
        group: root
        mode: '0700'
      when: _has_monitoring_secrets

    - name: Deploy monitoring credentials
      copy:
        dest: /etc/swintronics/monitoring.env
        content: |
          HEALTHCHECKS_API_KEY={{ infisical_secrets.secrets.HEALTHCHECKS_API_KEY }}
          HEALTHCHECKS_HEARTBEAT_CHECK_UUID={{ infisical_secrets.secrets.HEALTHCHECKS_HEARTBEAT_CHECK_UUID }}
          TELEGRAM_BOT_TOKEN={{ infisical_secrets.secrets.SERVER_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID={{ infisical_secrets.secrets.SERVER_TELEGRAM_CHAT_ID }}
        owner: root
        group: root
        mode: '0600'
      when: _has_monitoring_secrets

    # ── Reboot-scheduled hook (advance notice) ────────────────────────────────
    # unattended-upgrades installs updates in the morning but reboots at 03:00
    # the following night. A path unit watches for /run/reboot-required so the
    # Telegram notice goes out when the reboot is flagged, not when it happens.

    - name: Deploy reboot-scheduled script
      when: _has_monitoring_secrets
      copy:
        dest: /usr/local/sbin/swintronics-reboot-scheduled.sh
        content: |
          #!/bin/bash
          # Telegram notice that installed updates require a reboot; unattended-upgrades
          # will reboot at its configured 03:00 window.
          # Managed by Ansible. Do not edit — changes will be overwritten on next deployment.
          set -euo pipefail

          PKGS="unknown"
          if [[ -s /run/reboot-required.pkgs ]]; then
              PKGS=$(sort -u /run/reboot-required.pkgs | tr '\n' ' ')
          fi

          MESSAGE="🕒 $(hostname -s): updates require a reboot
          unattended-upgrades will reboot at 03:00 tonight
          Packages: ${PKGS}"

          curl -s -X POST \
              --max-time 10 \
              --retry 2 \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE}" >/dev/null
        owner: root
        group: root
        mode: '0755'

    - name: Deploy reboot-scheduled systemd service
      when: _has_monitoring_secrets
      copy:
        dest: /etc/systemd/system/swintronics-reboot-scheduled.service
        content: |
          [Unit]
          Description=Swintronics: Telegram notice that a reboot is pending

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/swintronics-reboot-scheduled.sh
          EnvironmentFile=/etc/swintronics/monitoring.env
        mode: '0644'
      notify: reload systemd

    - name: Deploy reboot-scheduled systemd path unit
      when: _has_monitoring_secrets
      copy:
        dest: /etc/systemd/system/swintronics-reboot-scheduled.path
        content: |
          [Unit]
          Description=Swintronics: watch for pending reboot flag

          [Path]
          PathExists=/run/reboot-required

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      notify: reload systemd

    - name: Enable and start reboot-scheduled path unit
      systemd:
        name: swintronics-reboot-scheduled.path
        enabled: yes
        state: started
        daemon_reload: yes   # unit may have been written just above, before handlers run
      when: _has_monitoring_secrets
      # In check mode the unit file hasn't actually been written yet
      ignore_errors: "{{ ansible_check_mode }}"

    # ── Pre-reboot hook ───────────────────────────────────────────────────────

    - name: Deploy pre-reboot script
      when: _has_monitoring_secrets
      copy:
        dest: /usr/local/sbin/swintronics-pre-reboot.sh
        content: |
          #!/bin/bash
          # Runs as ExecStop of a boot-time unit, so it fires early in shutdown
          # while the network is still up. Records the shutdown reason for
          # boot-notify, pauses healthchecks.io, and notifies Telegram.
          # Managed by Ansible. Do not edit — changes will be overwritten on next deployment.
          set -euo pipefail

          # ExecStop also fires on manual `systemctl stop`/deploy restarts —
          # only act when the whole system is actually shutting down.
          if [[ "$(systemctl is-system-running)" != "stopping" ]]; then
              echo "swintronics-pre-reboot: not a system shutdown, skipping."
              exit 0
          fi

          REASON="planned shutdown (manual or unscheduled)"
          if [[ -f /run/reboot-required ]]; then
              PKGS=$(sort -u /run/reboot-required.pkgs 2>/dev/null | tr '\n' ' ' || true)
              REASON="unattended-upgrades (packages: ${PKGS:-unknown})"
          fi
          echo "swintronics-pre-reboot: recording shutdown reason: ${REASON}"
          mkdir -p /var/lib/swintronics
          printf '%s — %s\n' "$(date -Is)" "${REASON}" > /var/lib/swintronics/shutdown-reason

          echo "swintronics-pre-reboot: pausing healthchecks.io monitor..."
          curl -s -X POST \
            -H "X-Api-Key: ${HEALTHCHECKS_API_KEY}" \
            --max-time 5 \
            --retry 2 \
            "https://healthchecks.io/api/v3/checks/${HEALTHCHECKS_HEARTBEAT_CHECK_UUID}/pause" || \
            echo "swintronics-pre-reboot: warning: healthchecks.io pause failed (proceeding anyway)"

          echo "swintronics-pre-reboot: notifying via Telegram..."
          curl -s -X POST \
            --max-time 5 \
            --retry 1 \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=🔄 $(hostname -s): shutting down — ${REASON}" || \
            echo "swintronics-pre-reboot: warning: Telegram notify failed (proceeding anyway)"

          echo "swintronics-pre-reboot: done."
        owner: root
        group: root
        mode: '0755'

    - name: Deploy pre-reboot systemd unit
      when: _has_monitoring_secrets
      copy:
        dest: /etc/systemd/system/swintronics-pre-reboot.service
        content: |
          [Unit]
          Description=Swintronics pre-reboot: record shutdown reason, pause healthchecks.io
          # ExecStop pattern: the unit starts (a no-op) at boot and its ExecStop
          # runs at shutdown. systemd stops units in reverse start order, so
          # ordering After= the network stack means the script runs while the
          # network is still up — unlike a shutdown.target unit, which ran only
          # after NetworkManager/tailscaled were already down (issue #113).
          After=network-online.target systemd-resolved.service
          Wants=network-online.target

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/bin/true
          ExecStop=/usr/local/sbin/swintronics-pre-reboot.sh
          EnvironmentFile=/etc/swintronics/monitoring.env
          TimeoutStopSec=60

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      notify: reload systemd

    - name: Remove stale pre-reboot symlinks from shutdown targets
      file:
        path: "/etc/systemd/system/{{ item }}.wants/swintronics-pre-reboot.service"
        state: absent
      loop:
        - reboot.target
        - halt.target
        - shutdown.target
      when: _has_monitoring_secrets
      notify: reload systemd

    # ── Post-boot hook ────────────────────────────────────────────────────────

    - name: Deploy post-boot script
      when: _has_monitoring_secrets
      copy:
        dest: /usr/local/sbin/swintronics-post-boot.sh
        content: |
          #!/bin/bash
          # Wait for Gatus to come back up, then resume healthchecks.io monitoring.
          # Containers themselves are restarted by dockerd (restart: always); this script
          # just gates the healthchecks resume on Gatus being ready to ping it.
          # Managed by Ansible. Do not edit — changes will be overwritten on next deployment.
          set -euo pipefail

          echo "swintronics-post-boot: waiting for Gatus container to be running..."
          timeout 120 bash -c \
            'until docker ps -q --filter name=^/gatus$ --filter status=running 2>/dev/null | grep -q .; do sleep 2; done'

          echo "swintronics-post-boot: waiting for Gatus startup delay ({{ gatus_delay_start_seconds + 30 }}s)..."
          sleep {{ gatus_delay_start_seconds + 30 }}

          echo "swintronics-post-boot: resuming healthchecks.io monitor..."
          curl -s -X POST \
            -H "X-Api-Key: ${HEALTHCHECKS_API_KEY}" \
            --max-time 5 \
            --retry 2 \
            "https://healthchecks.io/api/v3/checks/${HEALTHCHECKS_HEARTBEAT_CHECK_UUID}/resume" || \
            echo "swintronics-post-boot: warning: healthchecks.io resume failed (proceeding anyway)"

          echo "swintronics-post-boot: done."
        owner: root
        group: root
        mode: '0755'

    - name: Deploy post-boot failure notification script
      when: _has_monitoring_secrets
      copy:
        dest: /usr/local/sbin/swintronics-post-boot-failed.sh
        content: |
          #!/bin/bash
          # Send a Telegram alert if swintronics-post-boot.service fails.
          # Managed by Ansible. Do not edit — changes will be overwritten on next deployment.
          curl -sf -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=❌ swintronics: post-boot monitoring restoration FAILED. Manual intervention required."
        owner: root
        group: root
        mode: '0755'

    - name: Deploy post-boot failure notification systemd unit
      when: _has_monitoring_secrets
      copy:
        dest: /etc/systemd/system/swintronics-post-boot-failed.service
        content: |
          [Unit]
          Description=Swintronics post-boot failure notification

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/swintronics-post-boot-failed.sh
          EnvironmentFile=/etc/swintronics/monitoring.env
        mode: '0644'
      notify: reload systemd

    - name: Deploy post-boot systemd unit
      when: _has_monitoring_secrets
      copy:
        dest: /etc/systemd/system/swintronics-post-boot.service
        content: |
          [Unit]
          Description=Swintronics post-boot: resume healthchecks.io after Gatus is ready
          After=docker.service network-online.target
          Wants=network-online.target
          OnFailure=swintronics-post-boot-failed.service

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/swintronics-post-boot.sh
          EnvironmentFile=/etc/swintronics/monitoring.env
          RemainAfterExit=yes
          TimeoutStartSec=180

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      notify: reload systemd

    - name: Enable and start pre-reboot service
      # Must be started, not just enabled: ExecStop only runs at shutdown if
      # the unit is active. Starting is a no-op (ExecStart=/bin/true).
      service:
        name: swintronics-pre-reboot
        enabled: yes
        state: started
      when: _has_monitoring_secrets

    - name: Enable post-boot service
      service:
        name: swintronics-post-boot
        enabled: yes
      when: _has_monitoring_secrets

    # ── Boot-notify hook (every boot, including crash/watchdog recovery) ─────

    - name: Deploy boot-notify script
      copy:
        dest: /usr/local/sbin/swintronics-boot-notify.sh
        content: |
          #!/bin/bash
          # Send a Telegram message on every boot. Indicates whether the previous
          # shutdown was clean (planned reboot) or unclean (crash / watchdog / power loss).
          # Managed by Ansible. Do not edit — changes will be overwritten on next deployment.
          set -euo pipefail

          HOSTNAME=$(hostname -s)
          KERNEL=$(uname -r)
          BOOT_TIME=$(uptime -s)

          SHUTDOWN_NOTE=""
          if journalctl --list-boots --no-pager 2>/dev/null | grep -qE '^[[:space:]]*-1\b'; then
              if journalctl -b -1 -n 100 --no-pager 2>/dev/null \
                  | grep -qiE "Reached target (power-off|reboot|halt|shutdown)\\.target"; then
                  SHUTDOWN_NOTE="✓ prior shutdown was clean"
              else
                  SHUTDOWN_NOTE="⚠️ prior shutdown UNCLEAN (crash, watchdog, or power loss)"
              fi
          else
              SHUTDOWN_NOTE="(no prior boot in journal)"
          fi

          # Shutdown reason recorded by swintronics-pre-reboot.sh; absent on
          # unclean shutdowns (crash/watchdog/power loss).
          REASON_FILE=/var/lib/swintronics/shutdown-reason
          REASON_NOTE="(no shutdown reason recorded)"
          if [[ -f "${REASON_FILE}" ]]; then
              REASON_NOTE="Reason: $(cat "${REASON_FILE}")"
              rm -f "${REASON_FILE}"
          fi

          MESSAGE="🟢 ${HOSTNAME} booted
          Kernel: ${KERNEL}
          Boot time: ${BOOT_TIME}
          ${SHUTDOWN_NOTE}
          ${REASON_NOTE}"

          curl -s -X POST \
              --max-time 10 \
              --retry 2 \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE}" >/dev/null
        owner: root
        group: root
        mode: '0755'

    - name: Deploy boot-notify systemd unit
      copy:
        dest: /etc/systemd/system/swintronics-boot-notify.service
        content: |
          [Unit]
          Description=Swintronics boot notification (Telegram)
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/swintronics-boot-notify.sh
          EnvironmentFile=/etc/swintronics/monitoring.env
          TimeoutStartSec=30

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      notify: reload systemd

    - name: Enable boot-notify service
      service:
        name: swintronics-boot-notify
        enabled: yes

  handlers:
    - name: restart unattended-upgrades
      service:
        name: unattended-upgrades
        state: restarted

    - name: reload systemd
      systemd:
        daemon_reload: yes
