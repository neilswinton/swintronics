---
# Set up the data disk: format (if needed) and create the directory structure.
# Run this once after provisioning before starting services.
# Services are optional — only those with a version defined in versions.yml
# will have directories created.
#
# For btrfs hosts (use_btrfs: true, default):
#   - Finds the second block device, partitions and formats it as btrfs if not
#     already mounted, mounts it at data_disk_mountpoint, then creates btrfs
#     subvolumes for stateful services.
# For non-btrfs hosts (use_btrfs: false, e.g. OCI with no data disk):
#   - Skips all disk setup; creates plain directories under data_disk_mountpoint.
#
# Usage:
#   ansible-playbook playbooks/setup-storage.yml -e target=swintronics
#   ansible-playbook playbooks/setup-storage.yml -e target=oci-1

- name: Set up data disk storage layout
  hosts: "{{ target | default('clusters') }}"
  connection: "{{ 'local' if inventory_hostname in groups.get('local', []) else 'ssh' }}"
  become: true
  vars:
    _use_btrfs: "{{ use_btrfs | default(true) | bool }}"
    # All known services and their storage directory names.
    # stateful: true  → create a btrfs subvolume under volumes/
    # stateful: false → stateless; only a logs directory is created
    _service_storage:
      traefik:     { dir: traefik,      stateful: false }
      dozzle:      { dir: dozzle,       stateful: false }
      immich:      { dir: immich,       stateful: true, subvol_path: "immich/library" }
      paperless:   { dir: paperless,    stateful: true  }
      kuma:        { dir: uptime-kuma,  stateful: true  }
      stirling_pdf: { dir: stirling-pdf, stateful: false }
      linkwarden:  { dir: linkwarden,   stateful: true  }
      beszel:      { dir: beszel,       stateful: true  }
      dockhand:    { dir: dockhand,     stateful: true  }

  pre_tasks:
    - name: Load versions
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../versions.yml"

  tasks:
    # ── Disk formatting (btrfs hosts only) ───────────────────────────────────

    - name: Format and mount data disk
      when: _use_btrfs
      block:
        - name: Check if data disk is already mounted
          ansible.builtin.command: findmnt --noheadings {{ data_disk_mountpoint }}
          register: _mount_check
          failed_when: false
          changed_when: false

        - name: Find data disk device (second block device)
          ansible.builtin.shell: |
            ROOT_DISK=$(lsblk -dn -o NAME -e 7 | head -n1)
            lsblk -dn -o NAME -e 7 | grep -v "^${ROOT_DISK}$" | head -n1
          register: _data_disk_name
          changed_when: false
          when: _mount_check.rc != 0

        - name: Partition data disk
          community.general.parted:
            device: "/dev/{{ _data_disk_name.stdout }}"
            number: 1
            state: present
            part_end: "100%"
          when: _mount_check.rc != 0

        - name: Format data disk as btrfs
          community.general.filesystem:
            fstype: btrfs
            dev: "/dev/{{ _data_disk_name.stdout }}1"
            force: false
          when: _mount_check.rc != 0

        - name: Mount data disk
          ansible.posix.mount:
            path: "{{ data_disk_mountpoint }}"
            src: "/dev/{{ _data_disk_name.stdout }}1"
            fstype: btrfs
            opts: defaults,nofail,user_subvol_rm_allowed
            state: mounted
          when: _mount_check.rc != 0

        - name: Set ownership of data disk mountpoint
          ansible.builtin.file:
            path: "{{ data_disk_mountpoint }}"
            owner: "{{ admin_user }}"
            group: "{{ admin_user }}"
            state: directory
          when: _mount_check.rc != 0

    # ── Verify mountpoint ─────────────────────────────────────────────────────

    - name: Verify data disk mountpoint exists
      ansible.builtin.stat:
        path: "{{ data_disk_mountpoint }}"
      register: mountpoint_stat

    - name: Fail if mountpoint does not exist
      ansible.builtin.fail:
        msg: "Data disk mountpoint {{ data_disk_mountpoint }} does not exist. For btrfs hosts ensure use_btrfs: true; for OCI ensure cloud-init created the directory."
      when: not mountpoint_stat.stat.exists

    - name: Get filesystem type of data disk
      ansible.builtin.command: findmnt -n -o FSTYPE {{ data_disk_mountpoint }}
      register: fstype
      changed_when: false
      when: _use_btrfs

    - name: Fail if data disk is not btrfs
      ansible.builtin.fail:
        msg: "{{ data_disk_mountpoint }} is {{ fstype.stdout.strip() }}, expected btrfs"
      when: _use_btrfs and fstype.stdout.strip() != 'btrfs'

    # ── Directory structure ───────────────────────────────────────────────────

    - name: Create top-level volumes and logs directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: '0755'
      loop:
        - "{{ data_disk_mountpoint }}/volumes"
        - "{{ data_disk_mountpoint }}/logs"
        - "{{ data_disk_mountpoint }}/snapshots"

    - name: Create logs directory for each enabled service
      ansible.builtin.file:
        path: "{{ data_disk_mountpoint }}/logs/{{ _service_storage[item].dir }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: '0755'
      loop: "{{ _service_storage.keys() | list }}"
      when: item in versions

    - name: Create parent directory for services with a nested subvolume
      ansible.builtin.file:
        path: "{{ data_disk_mountpoint }}/volumes/{{ _service_storage[item].dir }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: '0755'
      loop: "{{ _service_storage.keys() | list }}"
      when:
        - item in versions
        - _service_storage[item].stateful
        - _service_storage[item].subvol_path is defined

    # ── btrfs subvolumes (btrfs hosts only) ───────────────────────────────────

    - name: Check if btrfs subvolume already exists for each enabled stateful service
      ansible.builtin.command:
        cmd: btrfs subvolume show {{ data_disk_mountpoint }}/volumes/{{ _service_storage[item].subvol_path | default(_service_storage[item].dir) }}
      register: _subvol_checks
      loop: "{{ _service_storage.keys() | list }}"
      when:
        - _use_btrfs
        - item in versions
        - _service_storage[item].stateful
      changed_when: false
      failed_when: false

    - name: Create btrfs subvolume for each enabled stateful service
      # btrfs subvolume create makes the directory itself — do not pre-create it
      ansible.builtin.command:
        cmd: btrfs subvolume create {{ data_disk_mountpoint }}/volumes/{{ _service_storage[item.item].subvol_path | default(_service_storage[item.item].dir) }}
      loop: "{{ _subvol_checks.results }}"
      when:
        - _use_btrfs
        - item is not skipped
        - item.rc != 0
      loop_control:
        label: "{{ item.item }}"

    - name: Create volume directories for stateful services (non-btrfs hosts)
      ansible.builtin.file:
        path: "{{ data_disk_mountpoint }}/volumes/{{ _service_storage[item].subvol_path | default(_service_storage[item].dir) }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: '0755'
      loop: "{{ _service_storage.keys() | list }}"
      when:
        - not _use_btrfs
        - item in versions
        - _service_storage[item].stateful

    - name: Set ownership of subvolumes to admin user
      ansible.builtin.file:
        path: "{{ data_disk_mountpoint }}/volumes/{{ _service_storage[item].subvol_path | default(_service_storage[item].dir) }}"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
      loop: "{{ _service_storage.keys() | list }}"
      when:
        - item in versions
        - _service_storage[item].stateful

    - name: Create subdirectories within subvolumes
      ansible.builtin.file:
        path: "{{ data_disk_mountpoint }}/volumes/{{ item.0.value.dir }}/{{ item.1 }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: '0755'
      with_subelements:
        - "{{ _service_storage | dict2items | selectattr('key', 'in', versions) | selectattr('value.subdirs', 'defined') | list }}"
        - value.subdirs
      loop_control:
        label: "{{ item.0.value.dir }}/{{ item.1 }}"

    # ── fstab and sudo (btrfs hosts only) ────────────────────────────────────

    - name: Check if user_subvol_rm_allowed already in fstab
      ansible.builtin.command:
        cmd: grep -c "user_subvol_rm_allowed" /etc/fstab
      register: _fstab_check
      changed_when: false
      failed_when: false
      when: _use_btrfs

    - name: Add user_subvol_rm_allowed to btrfs mount options in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(\S+\s+{{ data_disk_mountpoint }}\s+btrfs\s+)(\S+)(\s+.*)$'
        replace: '\1\2,user_subvol_rm_allowed\3'
        backup: true
      register: _fstab_change
      when:
        - _use_btrfs
        - _fstab_check.stdout | int == 0

    - name: Remount data disk to apply new mount options
      ansible.builtin.command: mount -o remount {{ data_disk_mountpoint }}
      when:
        - _use_btrfs
        - _fstab_change is changed

    - name: Allow admin user to create btrfs snapshots without password
      ansible.builtin.copy:
        content: |
          # Allow {{ admin_user }} to create btrfs snapshots
          # (deletion is handled without sudo via user_subvol_rm_allowed mount option)
          {{ admin_user }} ALL=(root) NOPASSWD: /usr/bin/btrfs subvolume snapshot *
        dest: /etc/sudoers.d/btrfs-snapshots
        owner: root
        group: root
        mode: '0440'
        validate: visudo -cf %s
      when: _use_btrfs
