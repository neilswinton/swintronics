# Machine playbook — copy to machines/<hostname>.yml (gitignored).
# Create inventory/host_vars/localhost.yml from localhost.yml.example first.
#
# Usage:
#   ansible-playbook playbooks/machines/<hostname>.yml
#
# To run a single playbook against this machine:
#   ansible-playbook playbooks/docker.yml -e target=localhost

- import_playbook: ../bootstrap.yml
- import_playbook: ../laptop.yml
- import_playbook: ../apps.yml
- import_playbook: ../develop.yml
- import_playbook: ../tailscale.yml
- import_playbook: ../docker.yml
- import_playbook: ../dns.yml
- import_playbook: ../setup-storage.yml
