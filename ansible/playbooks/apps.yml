- hosts: "{{ target | default('localhost') }}"
  connection: "{{ 'local' if (target | default('localhost')) == 'localhost' else 'ssh' }}"
  become: true
  tasks:
    - name: Add Signal apt signing key
      ansible.builtin.shell:
        cmd: wget -qO- https://updates.signal.org/desktop/apt/keys.asc | gpg --dearmor > /usr/share/keyrings/signal-desktop-keyring.gpg
        creates: /usr/share/keyrings/signal-desktop-keyring.gpg

    - name: Add Signal apt repository
      ansible.builtin.get_url:
        url: https://updates.signal.org/static/desktop/apt/signal-desktop.sources
        dest: /etc/apt/sources.list.d/signal-desktop.sources
        mode: '0644'

    - name: Install Signal
      ansible.builtin.apt:
        name: signal-desktop
        state: present
        update_cache: true

    - name: Add 1Password apt signing key
      ansible.builtin.shell:
        cmd: curl -sS https://downloads.1password.com/linux/keys/1password.asc | gpg --dearmor --output /usr/share/keyrings/1password-archive-keyring.gpg
        creates: /usr/share/keyrings/1password-archive-keyring.gpg

    - name: Add 1Password apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/amd64 stable main"
        state: present
        filename: 1password

    - name: Install 1Password
      ansible.builtin.apt:
        name:
          - 1password
          - 1password-cli
        state: present
        update_cache: true

  roles:
    - role: staticdev.brave
