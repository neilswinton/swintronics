- name: Install Ansible requirements
  hosts: "{{ target | default('clusters') }}"
  connection: "{{ 'local' if inventory_hostname in groups.get('local', []) else 'ssh' }}"
  gather_facts: false
  tasks:
    - name: Install required roles and collections
      ansible.builtin.command:
        cmd: ansible-galaxy install -r requirements.yml
      args:
        chdir: "{{ playbook_dir }}/.."
      delegate_to: localhost
      connection: local
      run_once: true

- hosts: "{{ target | default('clusters') }}"
  connection: "{{ 'local' if inventory_hostname in groups.get('local', []) else 'ssh' }}"
  become: true
  tasks:
    - name: Install base packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - jq
          - openssh-server
          - restic
          - software-properties-common
          - tmux
        state: present
        update_cache: true

    # Ubuntu's restic package lags upstream (24.04 ships 0.16.4, which doesn't
    # speak B2's v2 API) and strips the `self-update` subcommand. Install the
    # upstream binary to /usr/local/bin (ahead of /usr/bin in PATH) directly.
    - name: Query latest restic version from GitHub
      ansible.builtin.uri:
        url: https://api.github.com/repos/restic/restic/releases/latest
        return_content: true
      register: _restic_release
      check_mode: false

    - name: Set restic_latest_version
      ansible.builtin.set_fact:
        restic_latest_version: "{{ _restic_release.json.tag_name | regex_replace('^v', '') }}"

    - name: Check installed restic at /usr/local/bin
      ansible.builtin.command: /usr/local/bin/restic version
      register: _local_restic
      failed_when: false
      changed_when: false
      check_mode: false

    - name: Download and install upstream restic {{ restic_latest_version }}
      when: restic_latest_version not in (_local_restic.stdout | default(''))
      block:
        - name: Download restic release
          ansible.builtin.get_url:
            url: "https://github.com/restic/restic/releases/download/v{{ restic_latest_version }}/restic_{{ restic_latest_version }}_linux_amd64.bz2"
            dest: "/tmp/restic_{{ restic_latest_version }}_linux_amd64.bz2"
            mode: '0644'

        - name: Decompress restic binary
          ansible.builtin.command:
            cmd: "bunzip2 -f /tmp/restic_{{ restic_latest_version }}_linux_amd64.bz2"
            creates: "/tmp/restic_{{ restic_latest_version }}_linux_amd64"

        - name: Install restic to /usr/local/bin
          ansible.builtin.copy:
            src: "/tmp/restic_{{ restic_latest_version }}_linux_amd64"
            dest: /usr/local/bin/restic
            remote_src: true
            owner: root
            group: root
            mode: '0755'

        - name: Clean up restic tempfile
          ansible.builtin.file:
            path: "/tmp/restic_{{ restic_latest_version }}_linux_amd64"
            state: absent

    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone | default('America/New_York') }}"

    - name: Enable IPv4 forwarding
      ansible.posix.sysctl:
        name: net.ipv4.conf.all.forwarding
        value: '1'
        sysctl_file: /etc/sysctl.d/99-enable-ipv4-forwarding.conf
        reload: true

    - name: Install python3-pip for infisicalsdk
      ansible.builtin.apt:
        name: python3-pip
        state: present

    - name: Install infisicalsdk
      ansible.builtin.pip:
        name: infisicalsdk
        state: present
        extra_args: "--break-system-packages"

    - name: Deploy Mozilla modern sshd_config
      ansible.builtin.copy:
        src: ../files/sshd_config
        dest: /etc/ssh/sshd_config
        owner: root
        group: root
        mode: '0644'
      notify: Restart sshd
      when: inventory_hostname in groups.get('local', [])

    - name: Remove weak Diffie-Hellman moduli (< 3072 bits)
      ansible.builtin.shell:
        cmd: awk '$5 >= 3071' /etc/ssh/moduli > /etc/ssh/moduli.tmp && mv /etc/ssh/moduli.tmp /etc/ssh/moduli
      changed_when: false
      when: inventory_hostname in groups.get('local', [])


    - name: Ensure the user has a NOPASSWD entry in sudoers.d
      ansible.builtin.copy:
        content: |
          # Allow {{ ansible_facts['env']['SUDO_USER'] }} to run all commands as root without a password
          {{ ansible_facts['env']['SUDO_USER'] }} ALL=(ALL) NOPASSWD: ALL
        dest: "/etc/sudoers.d/{{ ansible_facts['env']['SUDO_USER'] }}"
        owner: root
        group: root
  handlers:
    - name: Restart sshd
      ansible.builtin.systemd:
        name: ssh
        state: restarted

