- name: Install and configure Tailscale
  hosts: "{{ target | default('localhost') }}"
  connection: "{{ 'local' if (target | default('localhost')) == 'localhost' else 'ssh' }}"
  become: true
  pre_tasks:
    - name: Verify required Tailscale vars are set
      ansible.builtin.assert:
        that:
          - tailscale_tag is defined
          - tailscale_authkey_secret is defined
        fail_msg: "tailscale_tag and tailscale_authkey_secret must be set in host_vars"

    - name: Login to Infisical
      infisical.vault.login:
        url: "https://app.infisical.com"
        auth_method: universal_auth
        universal_auth_client_id: "{{ infisical_client_id }}"
        universal_auth_client_secret: "{{ infisical_client_secret }}"
      register: infisical_login
      delegate_to: localhost
      check_mode: no

    - name: Fetch secrets from Infisical
      infisical.vault.read_secrets:
        login_data: "{{ infisical_login.login_data }}"
        project_id: "{{ infisical_project_id }}"
        env_slug: "{{ infisical_environment }}"
        path: "/"
        as_dict: true
      register: infisical_secrets
      delegate_to: localhost
      check_mode: no

    - name: Build tailscale up args
      ansible.builtin.set_fact:
        _tailscale_args: "{{ (
            ['--ssh', '--auto-update']
            + (['--advertise-routes=' + tailscale_subnet] if tailscale_subnet | default('') != '' else [])
            + (['--advertise-exit-node'] if tailscale_exit_node | default(false) | bool else [])
          ) | join(' ') }}"

  roles:
    - role: artis3n.tailscale.machine
      vars:
        tailscale_authkey: "{{ infisical_secrets.secrets[tailscale_authkey_secret] }}"
        tailscale_args: "{{ _tailscale_args }}"
        tailscale_tags: "{{ [tailscale_tag] }}"
