---
# Deploy service versions from ansible/versions.yml.
# Edit versions.yml and run this playbook — only services whose compose file
# or .env actually changes will be restarted.
#
# Services not defined in versions.yml are skipped entirely.
# Traefik is always restarted first. Uptime Kuma is stopped before any
# restart and started after, with healthchecks.io paused for the duration.
#
# Usage:
#   ansible-playbook playbooks/deploy-versions.yml -e target=swintronics
#   ansible-playbook playbooks/deploy-versions.yml -e target=cactus_cantina
#
# Dry run:
#   ansible-playbook playbooks/deploy-versions.yml --check

- name: Deploy service versions
  hosts: "{{ target | default('clusters') }}"
  connection: "{{ 'local' if inventory_hostname in groups.get('local', []) else 'ssh' }}"
  become: true

  vars_files:
    - "{{ playbook_dir }}/../versions.yml"

  vars:
    # Service definitions. Each entry describes where templates live and what
    # files to deploy. 'secret' files get mode 0600, others get 0644.
    _service_config:
      traefik:
        dir: networking
        dns_names: [traefik]
        files:
          - { src: compose.yml.j2,        dest: compose.yml }
          - { src: traefik.yml.j2,        dest: traefik.yml }
          - { src: traefik-static.yml.j2, dest: traefik-data/traefik.yml }
          - { src: .env.j2,               dest: .env,         secret: true }
      immich:
        dir: immich-app
        dns_names: [photos]
        files:
          - { src: compose.yml.j2,  dest: compose.yml }
          - { src: .env.j2,         dest: .env,               secret: true }
          - { src: backup-prepare,  dest: backup-prepare,     executable: true }
          - { src: backup-execute,  dest: backup-execute,     executable: true }
          - { src: backup-remote,   dest: backup-remote,      executable: true }
      paperless:
        dir: paperless
        dns_names: [paperless]
        files:
          - { src: compose.yml.j2,        dest: compose.yml }
          - { src: .env.j2,               dest: .env,         secret: true }
          - { src: docker-compose.env.j2, dest: docker-compose.env, secret: true }
          - { src: backup-prepare,        dest: backup-prepare, executable: true }
          - { src: backup-remote,         dest: backup-remote,  executable: true }
      kuma:
        dir: uptime-kuma
        dns_names: [status, status-admin]
        files:
          - { src: compose.yml.j2,  dest: compose.yml }
          - { src: .env.j2,         dest: .env,               secret: true }
          - { src: backup-execute,  dest: backup-execute,     executable: true }
          - { src: backup-remote,   dest: backup-remote,      executable: true }
      gatus:
        dir: gatus
        dns_names: [gatus]
        files:
          - { src: compose.yml.j2,  dest: compose.yml }
          - { src: config.yaml.j2,  dest: config.yaml }
          - { src: .env.j2,         dest: .env,               secret: true }
      stirling_pdf:
        dir: stirling-pdf
        dns_names: [stirling-pdf]
        files:
          - { src: compose.yml.j2,  dest: compose.yml }
          - { src: .env.j2,         dest: .env,               secret: true }
      beszel:
        dir: beszel
        dns_names: [beszel]
        files:
          - { src: compose.yml.j2,  dest: compose.yml }
          - { src: .env.j2,         dest: .env,               secret: true }
      dockhand:
        dir: dockhand
        dns_names: [dockhand]
        files:
          - { src: compose.yml.j2,  dest: compose.yml }
          - { src: .env.j2,         dest: .env,               secret: true }
      autoheal:
        dir: autoheal
        files:
          - { src: compose.yml.j2,  dest: compose.yml }
      homeassistant:
        dir: homeassistant
        dns_names: [ha]
        files:
          - { src: compose.yml.j2,          dest: compose.yml }
          - { src: .env.j2,                 dest: .env,            secret: true }
          - { src: backup-execute,          dest: backup-execute,  executable: true }
          - { src: backup-remote,           dest: backup-remote,   executable: true }
          - { src: configuration.yaml.j2,   volume_dest: configuration.yaml }
      zigbee2mqtt:
        dir: zigbee2mqtt
        dns_names: [z2m]
        files:
          - { src: compose.yml.j2,  dest: compose.yml }
          - { src: .env.j2,         dest: .env,            secret: true }
      mosquitto:
        dir: mosquitto
        files:
          - { src: compose.yml.j2,    dest: compose.yml }
          - { src: mosquitto.conf.j2, dest: mosquitto.conf }

  pre_tasks:
    - name: Determine disabled services
      ansible.builtin.set_fact:
        _disabled_services: >-
          {{ _service_config
             | dict2items
             | selectattr('value.enabled', 'defined')
             | selectattr('value.enabled', 'equalto', false)
             | map(attribute='key')
             | list }}

    - name: Determine enabled services
      ansible.builtin.set_fact:
        _enabled_services: >-
          {{ _service_config.keys()
             | reject('in', _disabled_services)
             | select('in', versions)
             | list }}

    - name: Build deploy file list for enabled services
      ansible.builtin.set_fact:
        _deploy_files: "{{ (_deploy_files | default([])) + (service_files) }}"
      vars:
        service_files: "{{ _service_config[item].files | map('combine', {'service': item}) | list }}"
      loop: "{{ _enabled_services }}"

    - name: Login to Infisical
      infisical.vault.login:
        url: "https://app.infisical.com"
        auth_method: universal_auth
        universal_auth_client_id: "{{ infisical_client_id }}"
        universal_auth_client_secret: "{{ infisical_client_secret }}"
      register: infisical_login
      delegate_to: localhost
      check_mode: no

    - name: Fetch secrets from Infisical
      infisical.vault.read_secrets:
        login_data: "{{ infisical_login.login_data }}"
        project_id: "{{ infisical_project_id }}"
        env_slug: "{{ infisical_environment }}"
        path: "/"
        as_dict: true
      register: infisical_secrets
      delegate_to: localhost
      check_mode: no

    - name: Set beszel agent secrets from Infisical
      ansible.builtin.set_fact:
        beszel_agent_key: "{{ infisical_secrets.secrets.BESZEL_AGENT_KEY }}"
        beszel_agent_token: "{{ infisical_secrets.secrets.BESZEL_AGENT_TOKEN }}"
      when:
        - "'BESZEL_AGENT_KEY' in infisical_secrets.secrets"
        - "'BESZEL_AGENT_TOKEN' in infisical_secrets.secrets"

  tasks:
    # ── Ensure service directories exist ─────────────────────────────────────

    - name: Ensure docker_services_path exists
      ansible.builtin.file:
        path: "{{ docker_services_path }}"
        state: directory
        owner: "{{ admin_user }}"
        mode: '0755'

    # ── Stop disabled services ────────────────────────────────────────────────

    - name: Check if disabled service directories exist
      ansible.builtin.stat:
        path: "{{ docker_services_path }}/{{ _service_config[item].dir }}"
      loop: "{{ _disabled_services }}"
      register: _disabled_dirs

    - name: Stop disabled services
      community.docker.docker_compose_v2:
        project_src: "{{ docker_services_path }}/{{ _service_config[item.item].dir }}"
        state: absent
      loop: "{{ _disabled_dirs.results | selectattr('stat.exists') | list }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Deploy shared networks.yml
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker-services/networks.yml"
        dest: "{{ docker_services_path }}/networks.yml"
        owner: "{{ admin_user }}"
        mode: '0644'

    - name: Ensure service directories exist
      ansible.builtin.file:
        path: "{{ docker_services_path }}/{{ _service_config[item].dir }}"
        state: directory
        owner: "{{ admin_user }}"
        mode: '0755'
      loop: "{{ _enabled_services }}"

    - name: Ensure traefik-data directories exist
      ansible.builtin.file:
        path: "{{ docker_services_path }}/networking/{{ item }}"
        state: directory
        owner: "{{ admin_user }}"
        mode: '0755'
      loop:
        - traefik-data
        - traefik-data/configs
      when: "'traefik' in _enabled_services"

    # ── Deploy templates ──────────────────────────────────────────────────────

    - name: Deploy service files
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../services/{{ _service_config[item.service].dir }}/{{ item.src }}"
        dest: >-
          {{ data_disk_mountpoint ~ '/volumes/' ~ _service_config[item.service].dir ~ '/' ~ item.volume_dest
             if item.volume_dest is defined
             else docker_services_path ~ '/' ~ _service_config[item.service].dir ~ '/' ~ item.dest }}
        owner: "{{ admin_user }}"
        mode: "{{ '0755' if item.executable | default(false) else ('0600' if item.secret | default(false) else '0644') }}"
      loop: "{{ _deploy_files | default([]) }}"
      register: _file_results

    - name: Deploy traefik TLS config
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../services/networking/traefik-data/configs/tls.yml"
        dest: "{{ docker_services_path }}/networking/traefik-data/configs/tls.yml"
        owner: "{{ admin_user }}"
        mode: '0644'
      when: "'traefik' in _enabled_services"

    - name: Deploy traefik logrotate config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../services/networking/traefik-logrotate.j2"
        dest: /etc/logrotate.d/traefik
        owner: root
        mode: '0644'
      when: "'traefik' in _enabled_services"

    # ── Determine what changed ────────────────────────────────────────────────

    - name: Determine changed services
      ansible.builtin.set_fact:
        _changed_services: >-
          {{ _file_results.results
             | selectattr('changed')
             | map(attribute='item.service')
             | unique | list }}

    - name: Nothing to do
      ansible.builtin.debug:
        msg: "All services are up to date."
      when: _changed_services | length == 0

    # ── Pull new images while services are still running ─────────────────────

    - name: Pull traefik image
      community.docker.docker_compose_v2:
        project_src: "{{ docker_services_path }}/networking"
        pull: always
      when: "'traefik' in _changed_services"

    - name: Pull images for other changed services
      community.docker.docker_compose_v2:
        project_src: "{{ docker_services_path }}/{{ _service_config[item].dir }}"
        pull: always
        profiles: "{{ _service_config[item].profiles | default(omit) }}"
      loop: "{{ _changed_services | reject('equalto', 'traefik') | reject('equalto', 'kuma') | list }}"
      when:
        - _changed_services | length > 0
        - (_service_config[item].profiles is not defined) or (_service_config[item].profiles | length > 0)

    # ── Stop Kuma and pause monitoring before restarting anything ─────────────

    - name: Stop Uptime Kuma
      community.docker.docker_compose_v2:
        project_src: "{{ docker_services_path }}/uptime-kuma"
        state: absent
      when:
        - _changed_services | length > 0
        - "'kuma' in versions"

    - name: Pause healthchecks.io monitor
      ansible.builtin.uri:
        url: "https://healthchecks.io/api/v3/checks/{{ infisical_secrets.secrets.HEALTHCHECKS_KUMA_CHECK_UUID }}/pause"
        method: POST
        headers:
          X-Api-Key: "{{ infisical_secrets.secrets.HEALTHCHECKS_API_KEY }}"
        status_code: 200
      delegate_to: localhost
      when:
        - _changed_services | length > 0
        - "'kuma' in versions"
        - "'HEALTHCHECKS_API_KEY' in infisical_secrets.secrets"

    # ── Restart changed services — traefik first ──────────────────────────────

    - name: Restart traefik
      community.docker.docker_compose_v2:
        project_src: "{{ docker_services_path }}/networking"
        state: present
        recreate: always
      when: "'traefik' in _changed_services"

    - name: Restart other changed services
      community.docker.docker_compose_v2:
        project_src: "{{ docker_services_path }}/{{ _service_config[item].dir }}"
        state: present
        recreate: always
        profiles: "{{ _service_config[item].profiles | default(omit) }}"
      loop: "{{ _changed_services | reject('equalto', 'traefik') | reject('equalto', 'kuma') | list }}"
      when:
        - _changed_services | length > 0
        - (_service_config[item].profiles is not defined) or (_service_config[item].profiles | length > 0)

    # ── Restart Kuma and resume monitoring ────────────────────────────────────

    - name: Start Uptime Kuma
      community.docker.docker_compose_v2:
        project_src: "{{ docker_services_path }}/uptime-kuma"
        state: present
      when:
        - _changed_services | length > 0
        - "'kuma' in versions"

    - name: Wait for Uptime Kuma to be ready
      ansible.builtin.wait_for:
        port: 3001
        delay: 5
        timeout: 60
      when:
        - _changed_services | length > 0
        - "'kuma' in versions"

    - name: Wait for Uptime Kuma to start issuing heartbeats
      ansible.builtin.pause:
        seconds: 30
      when:
        - _changed_services | length > 0
        - "'kuma' in versions"

    - name: Resume healthchecks.io monitor
      ansible.builtin.uri:
        url: "https://healthchecks.io/api/v3/checks/{{ infisical_secrets.secrets.HEALTHCHECKS_KUMA_CHECK_UUID }}/resume"
        method: POST
        headers:
          X-Api-Key: "{{ infisical_secrets.secrets.HEALTHCHECKS_API_KEY }}"
        status_code: [200, 409]
      delegate_to: localhost
      when:
        - _changed_services | length > 0
        - "'kuma' in versions"
        - "'HEALTHCHECKS_API_KEY' in infisical_secrets.secrets"

    # ── Cleanup ───────────────────────────────────────────────────────────────

    - name: Prune unused Docker images
      community.docker.docker_prune:
        images: true
        images_filters:
          dangling: false
      when: _changed_services | length > 0

    - name: Summary
      ansible.builtin.debug:
        msg: "Updated: {{ _changed_services | join(', ') }}"
      when: _changed_services | length > 0

    # ── Ensure DNS CNAME records exist for all enabled services ──────────────

    - name: Collect DNS names for enabled services
      ansible.builtin.set_fact:
        _service_dns_names: >-
          {{ _enabled_services
             | map('extract', _service_config)
             | selectattr('dns_names', 'defined')
             | map(attribute='dns_names')
             | flatten | unique | list }}

    - name: Ensure CNAME records exist for enabled services
      community.general.cloudflare_dns:
        zone: "{{ server_domain }}"
        record: "{{ item }}"
        type: CNAME
        value: "{{ dns_cname_target | default(dns_hostname ~ '.' ~ server_domain) }}"
        proxied: false
        api_token: "{{ infisical_secrets.secrets.CF_DNS_API_TOKEN }}"
        state: present
      loop: "{{ _service_dns_names }}"
      delegate_to: localhost
      when: _service_dns_names | length > 0
