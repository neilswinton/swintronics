---
# Infisical configuration
# Credentials are read from environment variables — source ansible/.env.<cluster> before running playbooks.
infisical_client_id: "{{ lookup('env', 'INFISICAL_CLIENT_ID') }}"
infisical_client_secret: "{{ lookup('env', 'INFISICAL_CLIENT_SECRET') }}"
infisical_project_id: "{{ lookup('env', 'INFISICAL_PROJECT_ID') }}"
infisical_environment: "dev"

# Timezone (override per host if needed)
timezone: "America/New_York"

# Defaults (override in cluster or host vars)
data_disk_mountpoint: /docker-data
cert_resolver: "staging"
gatus_delay_start_seconds: 120
